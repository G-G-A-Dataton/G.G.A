# Metrics are accepted only for an independently labelled dataset containing
# real scores emitted by every evaluated stage. The generated golden set is
# intentionally excluded until its candidate negatives are human-verified.
eval_dataset: "datasets/golden_testset_verified_v1.parquet"

retrieval:
  top_k_bm25: 200
  top_k_dense: 200
  fusion_method: "rrf"  # "rrf" | "linear"
  rrf_k: 60
  bm25_weight: 0.5
  dense_weight: 0.5
  eval_ks: [10, 50, 100]

first_stage_model:
  artifact_dir: "outputs/ensemble_artifacts"
  enabled: true

reranker:
  enabled: true
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  max_length: 256
  top_k_rerank: 100
  blend_weight_first: 0.3
  blend_weight_reranker: 0.7

calibration:
  enabled: true
  method: "platt"  # "platt" | "isotonic"
  n_bins: 10

evaluation_contract:
  require_verified_labels: true
  label_status_column: "label_status"
  accepted_label_statuses: ["verified_positive", "verified_negative"]
  bm25_score_column: "bm25_score"
  dense_score_column: "dense_score"
  hybrid_score_column: "hybrid_score"
  rerank_score_column: "rerank_score"
  calibrated_score_column: "calibrated_score"

output:
  report_md: "docs/latest_benchmark_report.md"
  metrics_csv: "outputs/latest_benchmark_metrics.csv"
